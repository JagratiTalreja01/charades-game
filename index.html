
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Charades Night</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:white;text-align:center;padding:20px}
.card{background:#222;padding:20px;border-radius:20px;margin:15px auto;max-width:420px}
button{padding:14px 20px;margin:6px;border:none;border-radius:12px;font-size:16px}
.green{background:#22c55e;color:white}
.red{background:#ef4444;color:white}
.blue{background:#3b82f6;color:white}
.gray{background:#555;color:white}
.score{display:flex;justify-content:space-around}
</style>
</head>
<body>

<h1>🎭 Charades Night</h1>
<p>9 Players • 3 Teams • 40 Minutes</p>

<div class="card">
<h2 id="team">Team A</h2>
<h3 id="timer">45</h3>
<h2 id="prompt">Press New Prompt</h2>
</div>

<div class="card score">
<div>Team A<br><span id="a">0</span></div>
<div>Team B<br><span id="b">0</span></div>
<div>Team C<br><span id="c">0</span></div>
</div>

<button class="blue" onclick="startTimer()">Start</button>
<button class="gray" onclick="newPrompt()">New Prompt</button><br>
<button class="green" onclick="correct()">Correct</button>
<button class="red" onclick="nextTeam()">Skip</button>

<script>
let prompts=["Sleeping baby","Zombie","Monkey","Pizza","Shark attack",
"WiFi not working","Taking selfie","Alien","Walking on hot sand",
"Phone battery at 1%","Magician","Ninja"];

let teams=["Team A","Team B","Team C"];
let teamIndex=0;
let scores=[0,0,0];
let time=45;
let interval;

function newPrompt(){
document.getElementById("prompt").innerText=prompts[Math.floor(Math.random()*prompts.length)];
resetTimer();
}

function startTimer(){
clearInterval(interval);
interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time<=0){clearInterval(interval);alert("Time up!");}
},1000)
}

function resetTimer(){
clearInterval(interval);
time=45;
document.getElementById("timer").innerText=time;
}

function correct(){
scores[teamIndex]++;
updateScores();
nextTeam();
}

function updateScores(){
document.getElementById("a").innerText=scores[0];
document.getElementById("b").innerText=scores[1];
document.getElementById("c").innerText=scores[2];
}

function nextTeam(){
teamIndex=(teamIndex+1)%3;
document.getElementById("team").innerText=teams[teamIndex];
resetTimer();
newPrompt();
}
</script>

</body>
</html>
